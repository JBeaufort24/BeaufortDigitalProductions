    <section class="contact" id="contact">
      <form class="contact-form">
        <h1 class="contact-header">Let's build your dream together</h1>
        <p class="contact-paragraph">Tell us about your production vision. We usually respond within 24 hours.</p>
        
        <label for="fname">First name:</label><br>
        <input type="text" id="fname" name="fname" placeholder="First Name"><br>
        <label for="lname">Last name:</label><br>
        <input type="text" id="lname" name="lname" placeholder="Surname">
        <br>
        <input type="checkbox" id="webdev" name="fav_language" value="webdev">
        <label for="webdev">Web Development</label><br>
        <input type="checkbox" id="webdes" name="fav_language" value="webdes">
        <label for="webdes">Web Design</label><br>

        <label for="audio">Audio Editing</label>
        <input type="checkbox" id="video" name="fav_language" value="video">
        <label for="video">Video Editing</label>
        <input type="checkbox" id="full" name="fav_language" value="full">
        <label for="full">Full Suite</label>
        
        <label for="message">Describe Your Vision Here</label>
        <textarea id="message" name="message" rows="4" cols="30" placeholder="Describe your idea and dream here..."></textarea>
        <button type="submit" class="submit">Initiate Project Consultation</button>
